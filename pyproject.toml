[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy relationship() forward references are strings at runtime;
# the Mapped[...] annotations are never evaluated, so F821 is a false positive.
"models/*.py" = ["F821"]
# Auto-generated migration files — don't enforce style rules
"alembic/*" = ["E501", "W291", "I001"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
# SQLAlchemy Mapped[] and FastAPI Depends() generate many false positives
# without the full plugin chain; keep mypy focused on what it can verify.
disable_error_code = ["misc", "valid-type", "import-untyped"]
exclude = ["scripts/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
pythonpath = ["."]
markers = [
    "core: Auth, config, DB, basic infrastructure",
    "events: Event CRUD, calendar, attendance",
    "players: Player management, absences, teams",
    "notifications: Notification system, email, telegram channels",
    "i18n: Locale and translation tests",
    "integration: Seasons, users, dashboard, full flows",
    "telegram: Telegram bot webhook and service",
    "slow: Tests that take longer (import, schedule)",
]
filterwarnings = [
    "ignore:.*iscoroutinefunction:DeprecationWarning:slowapi",
    "ignore:.*(get|set)_event_loop_policy:DeprecationWarning:pytest_asyncio",
]
