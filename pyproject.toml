[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy relationship() forward references are strings at runtime;
# the Mapped[...] annotations are never evaluated, so F821 is a false positive.
"models/*.py" = ["F821"]
# Auto-generated migration files — don't enforce style rules
"alembic/*" = ["E501", "W291", "I001"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
# SQLAlchemy Mapped[] and FastAPI Depends() generate many false positives
# without the full plugin chain; keep mypy focused on what it can verify.
disable_error_code = ["misc", "valid-type", "import-untyped"]
exclude = ["scripts/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
pythonpath = ["."]
