<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333333; background-color: #ffffff;">

  <div style="border-bottom: 2px solid #333333; padding-bottom: 12px; margin-bottom: 24px;">
    <strong style="font-size: 20px; letter-spacing: 0.5px;">{{ app_name }}</strong>
  </div>

  <div style="margin-bottom: 24px;">
    {% block content %}{% endblock %}
  </div>

  {% if magic_link %}
  <div style="margin: 32px 0;">
    <a href="{{ magic_link }}"
       style="background-color: #2563eb; color: #ffffff; padding: 12px 28px; text-decoration: none; border-radius: 6px; display: inline-block; font-weight: bold;">
      {{ t("email.login_button") }}
    </a>
  </div>
  {% endif %}

  <div style="border-top: 1px solid #cccccc; padding-top: 12px; margin-top: 32px; font-size: 12px; color: #666666;">
    {{ t("email.footer", app_name=app_name) }}
  </div>

</body>
</html>
