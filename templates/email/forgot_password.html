{% extends "email/base.html" %}
{% block content %}
<p>{{ t("email.forgot_password_intro") }}</p>
<table style="border-collapse: collapse; margin: 12px 0;">
  <tr>
    <td style="padding: 4px 16px 4px 0; font-weight: bold;">{{ t("email.label_username") }}</td>
    <td style="padding: 4px 0;">{{ username }}</td>
  </tr>
  <tr>
    <td style="padding: 4px 16px 4px 0; font-weight: bold;">{{ t("email.label_password") }}</td>
    <td style="padding: 4px 0; font-family: monospace;">{{ password }}</td>
  </tr>
</table>
{% endblock %}
