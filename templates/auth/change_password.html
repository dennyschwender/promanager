{% extends "base.html" %}
{% block title %}{{ t('auth.change_password_title') }} — {{ t('nav.app_name') }}{% endblock %}
{% block content %}
<div class="form-container-sm">
  <h2>{{ t('auth.change_password_title') }}</h2>
  <p class="text-muted">{{ t('auth.change_password_intro') }}</p>
  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/auth/change-password">
    <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
    <label for="new_password">{{ t('auth.new_password') }}
      <input type="password" id="new_password" name="new_password" required autofocus minlength="8">
    </label>
    <label for="confirm_password">{{ t('auth.confirm_password') }}
      <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
    </label>
    <button type="submit" class="btn btn-primary" style="width:100%;">{{ t('auth.change_password_submit') }}</button>
  </form>
</div>
{% endblock %}
